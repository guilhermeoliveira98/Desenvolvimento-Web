<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>

    <style>
     
body {
  background: #f5f5f7;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.base {
  width: 400px;
}

h2 {
  text-align: center;
  color: #000000;
}

.area {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border-radius: 8px; 
  border: black;
  background: #2942b1;
  color: white;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: white;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.remover {
  background: none;
  border: none;
  cursor: pointer;
}

.remover img {
  width: 18px;
}

.alerta {
  background: #2942b1;
  color: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
} 

</style>
</head>
<body>
    <div class="base">

        <h2>Compras</h2>
        <h1>Compras da semana</h1>

        <div class="area">
            <input type="text" id="id" placeholder="Adicione um novo item">
            <button onclick="adicionarItem()">Adicionar</button>
        </div>

        <ul id="lista"></ul>

        <div id="alerta" class="alerta" style="display: none;">
            <span>O item foi removido da lista</span>
            <button onclick="fecharAlerta()"><img src="fechar.png"></button>
        </div>

    </div>

    <script src="Script.js"></script>

</body>
</html>
